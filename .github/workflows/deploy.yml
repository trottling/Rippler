name: Deploy Windows Build

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path main.spec) { Remove-Item -Force main.spec }

      - name: Build executable (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm --noconsole --clean --name rippler --onefile --icon assets\\icon.ico --add-data "assets\\*.*;." main.py

      - name: Calculate next version
        id: version
        shell: pwsh
        run: |
          $tags = git tag --list "v2.*.0"
          $maxMinor = 0

          foreach ($tag in $tags) {
            if ($tag -match '^v2\.(\d+)\.0$') {
              $minor = [int]$Matches[1]
              if ($minor -gt $maxMinor) {
                $maxMinor = $minor
              }
            }
          }

          $nextMinor = $maxMinor + 1
          $version = "2.$nextMinor.0"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Build for commit: ${{ github.sha }}

            Commit message:
            ${{ github.event.head_commit.message }}
          files: dist/rippler.exe
          generate_release_notes: true
