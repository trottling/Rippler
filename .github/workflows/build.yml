name: Build and Release EXE

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-global
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  APP_ENTRYPOINT: "main.py"
  APP_NAME: "rippler"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch all tags
        shell: pwsh
        run: git fetch --force --tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install nuitka ordered-set zstandard

      - name: Calculate next build version
        id: version
        shell: pwsh
        run: |
          $tags = git tag --list "${{ env.APP_NAME }}_v*"
          $maxBuild = 0

          foreach ($tag in $tags) {
            if ($tag -match "^${{ env.APP_NAME }}_v(\d+)$") {
              $num = [int]$Matches[1]
              if ($num -gt $maxBuild) { $maxBuild = $num }
            }
          }

          $nextBuild = $maxBuild + 1
          $buildName = "${{ env.APP_NAME }}_v$nextBuild"
          $fileName = "$buildName.exe"

          Set-Content -Path "assets/version.txt" -Value $nextBuild -Encoding utf8

          "number=$nextBuild" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$buildName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$buildName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "filename=$fileName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare release body
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
          $lines = @()
          $lines += "🛠 **Build**: **${{ steps.version.outputs.name }}**"
          $lines += "🔗 **Commit**: **$env:GITHUB_SHA**"
          $lines += ""

          if ($env:GITHUB_EVENT_NAME -eq "push" -and $null -ne $event.commits -and $event.commits.Count -gt 0) {
            $lines += "Commits in this push:"
            foreach ($commit in $event.commits) {
              $sha = $commit.id.Substring(0,7)
              $title = ($commit.message -split "`r?`n")[0]
              $commitUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/commit/$($commit.id)"
              $lines += "📍 [$sha]($commitUrl) $title"
            }
            if ($null -ne $event.compare -and $event.compare -ne "") {
              $lines += ""
              $lines += "📝 **Compare**: **$($event.compare)**"
            }
          } else {
            $message = git log -1 --pretty=%s
            $shortSha = git rev-parse --short HEAD
            $commitUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/commit/$env:GITHUB_SHA"
            $lines += "📝 **Commit**:"
            $lines += "📍 [$shortSha]($commitUrl) $message"
          }

          $lines -join "`r`n" | Set-Content -Path release_body.txt -Encoding utf8

      - name: Clean previous build artifacts
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build EXE with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --windows-console-mode=disable `
            --include-windows-runtime-dlls=yes `
            --enable-plugin=pyside6 `
            --windows-icon-from-ico=assets/icon.ico `
            --output-filename=${{ steps.version.outputs.filename }} `
            --output-dir=dist `
            --include-data-dir=assets=assets `
            --assume-yes-for-downloads `
            --lto=yes `
            --jobs=-2 `
            ${{ env.APP_ENTRYPOINT }}

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.name }}
          body_path: release_body.txt
          files: dist/${{ steps.version.outputs.filename }}
          fail_on_unmatched_files: true